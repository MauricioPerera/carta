---
intent: Agent A publica análisis con contexto versionado
role: Publisher
permissions:
  - publish_to_postal
  - read_okf
  - reference_ccdd_contract
okf_reference:
  source: 'okf://'
  immutable: true
token_budget:
  system: 2000
  context: 3000
  total: 5000
access_control:
  can_send_to: ['Agent B']
rules:
  - 'Debe incluir OKF SHA en cada mensaje'
  - 'Debe referenciar este contract SHA'
execution:
  # Avoid interpreters/launchers (python/bash/env/…) — they are arbitrary code
  # and defeat the allowlist. Note even these tools have escapes (git -c
  # core.pager=…, curl -o); the allowlist narrows attack surface, it is not a
  # sandbox. See ARCHITECTURE.md, Governance ("allowed is not safe").
  allowed_commands: ['curl', 'git', 'echo', 'cat', 'ls']
  allowed_urls: ['https://api.n8n.io', 'https://ardf.dev']
  timeout: 30